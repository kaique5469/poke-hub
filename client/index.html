<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RarityGrid — Pokémon Card Prices, Sets & Marketplace</title>
    <meta
      name="description"
      content="Track English Pokémon card prices in USD, explore every TCG set, discover market trends and shop real listings from collectors and trusted stores."
    />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="theme-color" content="#6d28d9" />
    <meta property="og:site_name" content="RarityGrid" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:title"
      content="RarityGrid — Pokémon Card Prices, Sets & Marketplace"
    />
    <meta
      property="og:description"
      content="Track Pokémon card prices, explore complete TCG sets and shop real collector listings."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://raritygrid.com/" />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="RarityGrid — Pokémon Card Prices, Sets & Marketplace"
    />
    <meta
      name="twitter:description"
      content="Track Pokémon card prices, explore complete TCG sets and shop real collector listings."
    />
    <link rel="canonical" href="https://raritygrid.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://raritygrid.com/#organization",
            "name": "RarityGrid",
            "url": "https://raritygrid.com/",
            "description": "Pokémon TCG card prices, collector tools and marketplace listings for the US market."
          },
          {
            "@type": "WebSite",
            "@id": "https://raritygrid.com/#website",
            "url": "https://raritygrid.com/",
            "name": "RarityGrid",
            "publisher": { "@id": "https://raritygrid.com/#organization" },
            "inLanguage": "en-US",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://raritygrid.com/cards?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
