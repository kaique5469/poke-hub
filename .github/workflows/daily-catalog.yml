# Atualiza o catálogo real de produtos selados uma vez por dia.
# Requer APP_URL e CRON_SECRET em Settings → Secrets and variables → Actions.

name: Daily Scrydex Catalog

on:
  schedule:
    - cron: "20 10 * * *" # 10:20 UTC; horário separado dos artigos
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar produtos selados e preços
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/scheduled/scrydex-sync" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{}'
